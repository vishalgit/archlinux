# ==============================================================================
# 🔥 tmux.conf — Optimized for Neovim + C-Space Prefix
# ✅ Prefix = C-Space
# ✅ | = vertical split | - = horizontal split
# ✅ Resize with Alt+h/j/k/l or Alt+arrow
# ✅ Seamless Neovim + clipboard integration
# ==============================================================================

# ── ESSENTIALS ────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc:Ms=\\E]52;%p1%s;%p2%s\\007"
set -ga terminal-overrides ",*:Smulx=\\E[4::%p1%dm"      # Undercurl (Neovim)
set -ga terminal-overrides ",*:sitm=\\E[3m:ritm=\\E[23m" # Italics
set -g focus-events on          # Neovim focus awareness
set -g escape-time 0            # Snappy ESC
set -g history-limit 10000
setw -g mode-keys vi            # Vi mode
setw -g aggressive-resize off   # Prevent Neovim redraw flicker
set -g set-clipboard on
set -g allow-passthrough on

# ── PREFIX = C-Space ──────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Optional: Double-tap Space as prefix (if C-Space is unreliable)
# bind Space if-shell "test -z \"#{alternate_on}\"" \
#   "set prefix C-Space; set status-left-style bg=colour33" \
#   "send-keys Space"
# set -g prefix2 Space

# ── NAVIGATION (no prefix needed) ─────────────────────────────────────────────
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ── PANE SPLITTING: | = vertical, - = horizontal ──────────────────────────────
bind \| split-window -h -c "#{pane_current_path}"   # | → vertical (side-by-side)
bind |  split-window -h -c "#{pane_current_path}"
bind -  split-window -v -c "#{pane_current_path}"   # - → horizontal (stacked)

# ── PANE RESIZING ─────────────────────────────────────────────────────────────
# Alt+h/j/k/l
bind -n M-h resize-pane -L 2
bind -n M-j resize-pane -D 1
bind -n M-k resize-pane -U 1
bind -n M-l resize-pane -R 2

# Alt+Arrow (fallback)
bind -n M-Left  resize-pane -L 2
bind -n M-Down  resize-pane -D 1
bind -n M-Up    resize-pane -U 1
bind -n M-Right resize-pane -R 2

# Prefix+HJKL (repeatable)
bind -r H resize-pane -L 2
bind -r J resize-pane -D 1
bind -r K resize-pane -U 1
bind -r L resize-pane -R 2

# ── COPY & PASTE ──────────────────────────────────────────────────────────────
bind [ copy-mode
bind ] paste-buffer

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
# macOS:
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy 2>/dev/null'
# Linux (uncomment if using xclip/xsel):
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -i -sel clipboard 2>/dev/null'

# ── MOUSE & INDEXING ──────────────────────────────────────────────────────────
set -g mouse on
bind F12 set -g mouse #{?mouse,off,on} \; display "🖱️ Mouse: #{?mouse,on,off}"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── STATUS BAR ────────────────────────────────────────────────────────────────
set -g status-style bg=colour236,fg=colour246
set -g status-left "#[fg=black,bg=colour39,bold] #S #[fg=colour39,bg=colour236] "
set -g status-right "#[fg=colour236,bg=colour235]#[fg=white,bg=colour235] %H:%M #[fg=colour235,bg=colour236]#[fg=colour240,bg=colour236] #H "
setw -g window-status-current-format "#[fg=black,bg=colour75,bold] #I:#W #[fg=colour75,bg=colour236,nobold]"
setw -g window-status-format "#[fg=colour244,bg=colour236] #I:#W "

# ── UTILITIES ─────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "✅ Config reloaded!"
bind x kill-pane
bind X kill-window

# ── OPTIONAL: TPM Plugins ─────────────────────────────────────────────────────
 set -g @plugin 'tmux-plugins/tpm'
 set -g @plugin 'christoomey/vim-tmux-navigator'  # C-hjkl across vim/tmux
 set -g @plugin 'tmux-plugins/tmux-resurrect'
 set -g @plugin 'tmux-plugins/tmux-continuum'
 set -g @continuum-restore 'on'
 run '~/.tmux/plugins/tpm/tpm'
